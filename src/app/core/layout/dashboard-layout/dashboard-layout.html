<div class="min-h-screen bg-bg-base text-text-primary flex flex-col relative overflow-hidden">
  <!-- Soft accent background glows -->
  <div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-purple-600/5 blur-[120px] pointer-events-none"></div>

  <!-- Shared Navbar -->
  <nav class="bg-bg-surface/30 backdrop-blur-md border-b border-border-default px-6 py-4 flex items-center justify-between shadow-md z-20">
    <div class="flex items-center gap-3">
      <a routerLink="/dashboard" class="flex items-center gap-3 group cursor-pointer">
        <div class="bg-primary p-2 rounded-lg text-white font-bold text-lg tracking-wider group-hover:scale-105 transition-all">
          IG
        </div>
        <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-primary to-purple-400 bg-clip-text text-transparent">
          Interview Guard AI
        </span>
      </a>
    </div>

    <div class="flex items-center gap-4">
      <div class="hidden sm:flex flex-col text-right">
        <span class="text-sm font-semibold text-text-primary">{{ currentUser()?.name || 'User' }}</span>
        <span class="text-[10px] text-primary font-bold uppercase tracking-widest">{{ currentUser()?.role || 'Guest' }}</span>
      </div>
      <button (click)="onLogout()" class="px-4 py-2 bg-bg-surface hover:bg-bg-elevated border border-border-default hover:border-border-subtle rounded-lg text-sm font-semibold tracking-wide transition duration-150 ease-in-out cursor-pointer text-text-secondary hover:text-text-primary">
        Sign Out
      </button>
    </div>
  </nav>

  <!-- Content Container -->
  <main class="flex-grow z-10">
    <router-outlet></router-outlet>
  </main>
</div>
