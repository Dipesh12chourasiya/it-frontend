@if (open) {
  <div class="dc-overlay" (click)="onOverlayClick($event)" (keydown.escape)="close.emit()">
    <div class="dc-panel" role="alertdialog" aria-modal="true">
      <div class="dc-icon">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      </div>
      <h4 class="dc-title">Delete current question?</h4>
      <p class="dc-text">All participants will see an empty problem panel. This action cannot be undone.</p>
      <div class="dc-actions">
        <button (click)="close.emit()" class="btn btn-secondary">Cancel</button>
        <button (click)="confirm.emit()" class="btn btn-danger" [disabled]="isSubmitting">
          @if (isSubmitting) {
            <span class="spinner"></span>
          }
          Delete
        </button>
      </div>
    </div>
  </div>
}
